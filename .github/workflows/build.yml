name: Build Android APK

on:
  push:
    tags: [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK
        run: |
          sdkmanager "platforms;android-36" \
            "build-tools;34.0.0" \
            "platform-tools" \
            "ndk;29.0.14033849"
          yes | sdkmanager --licenses > /dev/null

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'

      - run: flutter pub get

      - name: Sync version from git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          if [[ "$TAG" == *"+"* ]]; then
            VERSION=${TAG%+*}
            BUILD=${TAG#*+}
            perl -i -pe "s/^version: .*/version: $VERSION+$BUILD/" pubspec.yaml
          else
            perl -i -pe "s/^version: .*/version: $TAG+1/" pubspec.yaml
          fi
          head -5 pubspec.yaml

      - name: Build Android APK (release)
        uses: nick-fields/retry@v3
        with:
          max_attempts: 5
          retry_on: error
          retry_wait_seconds: 60
          timeout_minutes: 60
          command: flutter build apk --release

      # 用 jq 从 changelogs.json 提取当前 tag 的 release notes
      - name: Extract release body from changelogs.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          body=$(jq -r --arg tag "$TAG" '.[$tag] // "Release \($tag)"' .github/changelogs.json)
          echo "$body" > /tmp/release_body.md

      # 一站式创建/更新 release + 上传 APK + 设置 body
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          body_path: /tmp/release_body.md